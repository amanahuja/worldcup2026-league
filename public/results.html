<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Bracket League</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────── -->
<header class="topbar">
  <div>
    <div class="topbar__title">World Cup 2026 Bracket League</div>
    <div class="topbar__dates">FIFA World Cup 2026 · Jun 11 – Jul 19</div>
    <div class="topbar__sub" id="topbar-username"></div>
  </div>
  <button class="btn btn--primary" id="cta-btn" onclick="App.ctaClick()">Enter Predictions</button>
</header>

<!-- ── Main content ─────────────────────────────────────── -->
<main class="page-wrap" id="main">

  <div class="last-updated hidden" id="last-updated"></div>

  <!-- Countdown banner (hidden after Jun 11) -->
  <div class="countdown-banner hidden" id="countdown-banner">
    <div class="countdown-banner__time" id="countdown-text"></div>
    <a class="btn btn--primary btn--sm hidden" id="countdown-join"
       href="https://github.com/amanahuja/worldcup2026-league/blob/main/RULES.md"
       target="_blank" rel="noopener">Join the League</a>
  </div>

  <!-- Leaderboard -->
  <div class="section-title">Leaderboard</div>

  <!-- Podium (top 3) -->
  <div class="podium" id="podium">
    <div class="podium__slot podium__slot--2" id="pod-2">
      <div class="podium__block">
        <div class="podium__avatar" id="pod-2-avatar">—</div>
        <div class="podium__name" id="pod-2-name">—</div>
        <div class="podium__score" id="pod-2-score">—</div>
      </div>
      <div class="podium__rank">2nd</div>
    </div>
    <div class="podium__slot podium__slot--1" id="pod-1">
      <div class="podium__block">
        <div class="podium__avatar" id="pod-1-avatar">—</div>
        <div class="podium__name" id="pod-1-name">—</div>
        <div class="podium__score" id="pod-1-score">—</div>
      </div>
      <div class="podium__rank">1st</div>
    </div>
    <div class="podium__slot podium__slot--3" id="pod-3">
      <div class="podium__block">
        <div class="podium__avatar" id="pod-3-avatar">—</div>
        <div class="podium__name" id="pod-3-name">—</div>
        <div class="podium__score" id="pod-3-score">—</div>
      </div>
      <div class="podium__rank">3rd</div>
    </div>
  </div>

  <!-- Full ranked list -->
  <table class="lb-table" id="lb-table">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th style="text-align:right">Points Earned</th>
      </tr>
    </thead>
    <tbody id="lb-body">
      <tr><td colspan="3" class="text-muted" style="padding:20px;text-align:center">Loading…</td></tr>
    </tbody>
  </table>

  <!-- Match results section -->
  <div class="section-title" style="margin-top:28px">Match Results</div>

  <!-- Stage toggle tabs -->
  <div class="tab-strip" id="results-stage-tabs">
    <button class="tab tab--active" data-stage="groups" onclick="App.setResultsStage('groups')">Group Stage</button>
    <button class="tab" data-stage="knockout" onclick="App.setResultsStage('knockout')">Knockout</button>
  </div>

  <!-- Group stage results -->
  <div id="results-groups">
    <div class="groups-grid" id="results-groups-grid">
      <div class="text-muted" style="padding:20px;text-align:center;grid-column:1/-1">Loading…</div>
    </div>
  </div>

  <!-- Knockout results (hidden until tab selected) -->
  <div id="results-knockout" class="hidden">
    <div class="bracket-round-tabs" id="results-ko-tabs"></div>
    <div id="results-ko-view"></div>
  </div>

</main>

<!-- ── Footer ───────────────────────────────────────────── -->
<footer class="site-footer">
  <a href="https://github.com/amanahuja/worldcup2026-league/blob/main/RULES.md" target="_blank" rel="noopener">Rules &amp; Instructions</a>
  <span class="site-footer__sep">·</span>
  <a href="https://github.com/amanahuja/worldcup2026-league" target="_blank" rel="noopener" class="site-footer__gh" aria-label="GitHub">
    <svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
</footer>

<!-- ── Login modal ──────────────────────────────────────── -->
<div class="modal-backdrop hidden" id="login-modal">
  <div class="modal">
    <div class="modal__title">Sign in</div>
    <div class="modal__sub">Enter the name and passphrase you received from the admin.</div>
    <form onsubmit="App.submitLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-username">Name</label>
        <input class="form-input" type="text" id="login-username" autocomplete="username"
               autocapitalize="none" autocorrect="off" spellcheck="false" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-passphrase">Passphrase</label>
        <input class="form-input" type="password" id="login-passphrase" autocomplete="current-password" required>
      </div>
      <button class="btn btn--primary" style="width:100%" type="submit" id="login-submit-btn">Sign in</button>
      <div class="form-error" id="login-error"></div>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  App.initResults();
</script>
</body>
</html>
